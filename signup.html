<label>Full Name</label>

<input
    type="text"
    id="fullName"
    placeholder="Enter your name"
    required
>

<label>Email</label>

<input
    type="email"
    id="email"
    placeholder="Enter your email"
    required
>

<label>Password</label>

<input
    type="password"
    id="password"
    placeholder="Create password"
    required
>

<label>Confirm Password</label>

<input
    type="password"
    id="confirmPassword"
    placeholder="Confirm password"
    required
>
